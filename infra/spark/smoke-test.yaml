apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: agri-smoke-test
  namespace: agri-dev
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: bitnami/spark:3.5.1
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/work-dir/smoke_test.py
  sparkVersion: "3.5.1"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    memory: 1g
    serviceAccount: spark
    labels:
      version: 3.5.1
  executor:
    instances: 2
    cores: 1
    memory: 1g
    labels:
      version: 3.5.1