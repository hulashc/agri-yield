apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: agri-kafka
  namespace: agri-dev
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
spec:
  kafka:
    version: 4.1.0
    metadataVersion: "4.1-IV1"
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: external
        port: 9094
        type: nodeport
        tls: false
        configuration:
          bootstrap:
            nodePort: 32092
          brokers:
            - broker: 0
              advertisedHost: localhost
              nodePort: 32093
    config:
      offsets.topic.replication.factor: "1"
      transaction.state.log.replication.factor: "1"
      transaction.state.log.min.isr: "1"
      log.retention.hours: "168"
  entityOperator:
    topicOperator: {}
    userOperator: {}