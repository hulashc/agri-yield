name: CI — Lint & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          set -e
          pip install --upgrade pip
          pip install \
            numpy pandas scikit-learn xgboost pyarrow \
            fastapi uvicorn pydantic requests tenacity \
            prometheus-client prometheus-fastapi-instrumentator \
            mlflow feast redis ruff pytest pytest-md httpx

      - name: Lint with ruff
        run: |
          set -e
          ruff check . --output-format=github

      - name: Generate training data and train model
        run: |
          set -e
          python training/train_and_export.py

      - name: Run tests
        run: |
          set -e
          python -m pytest tests/ -v --tb=short
