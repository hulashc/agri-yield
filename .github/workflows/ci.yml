name: CI — Lint & Test

on:
  pull_request:
    branches: [main, improve/competition-upgrade]
  push:
    branches: [main, improve/competition-upgrade]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies (locked)
        run: uv sync --frozen --dev

      - name: Lint with ruff
        run: uv run ruff check . --output-format=github

      - name: Type check with mypy
        run: uv run mypy .

      - name: Generate training data and train model
        run: uv run python training/train_and_export.py

      - name: Assert model quality gate (RMSE < 2000 kg/ha)
        run: uv run python scripts/quality_gate.py

      - name: Upload quality gate result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-result
          path: scripts/quality_gate_result.json
          if-no-files-found: ignore

      - name: Run tests with coverage
        run: |
          uv run python -m pytest tests/ -v --tb=short \
            --cov=. --cov-report=term-missing --cov-fail-under=70
