name: Train → Build → Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/agri-yield

jobs:
  train-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies (locked)
        run: uv sync --frozen --dev

      - name: Lint with ruff
        run: uv run ruff check . --output-format=github

      - name: Generate training data and train model
        run: uv run python training/train_and_export.py

      - name: Assert model quality gate (RMSE < 2000 kg/ha)
        run: |
          uv run python - <<'EOF'
          import pickle, numpy as np, pandas as pd
          from training.utils.features import FEATURE_COLS
          from training.utils.splits import temporal_train_test_split

          TARGET = "yield_kg_per_ha"
          df = pd.read_parquet("data/features/weekly_field_features.parquet")
          df = df.dropna(subset=[TARGET])
          for col in FEATURE_COLS:
              if col not in df.columns:
                  df[col] = 0
          df["week_start"] = pd.to_datetime(
              df["year"].astype(str) + "-W" + df["week_of_year"].astype(str).str.zfill(2) + "-1",
              format="%G-W%V-%u",
              errors="coerce",
          )
          _, test_df = temporal_train_test_split(df)
          with open("model.pkl", "rb") as f:
              model = pickle.load(f)
          preds = model.predict(test_df[FEATURE_COLS])
          rmse = float(np.sqrt(np.mean((test_df[TARGET].values - preds) ** 2)))
          print(f"Quality gate RMSE: {rmse:.2f} kg/ha")
          assert rmse < 2000, f"RMSE {rmse:.2f} exceeds threshold of 2000 kg/ha — failing CI"
          print("Quality gate passed.")
          EOF

      - name: Run tests
        run: uv run python -m pytest tests/ -v --tb=short

      - name: Verify model.pkl exists
        run: |
          set -e
          ls -lh model.pkl
          echo "model.pkl ready"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          build-args: |
            BUILD_VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -fsSL "$RENDER_DEPLOY_HOOK"

      - name: Wait for deploy and verify /health
        if: env.RENDER_SERVICE_URL != ''
        env:
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          set -e
          echo "Waiting for Render deploy (cold start ~50s)..."
          for i in $(seq 1 30); do
            sleep 10
            status=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_SERVICE_URL/health" 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "Deploy verified — /health returned 200"
              curl -s "$RENDER_SERVICE_URL/health"
              exit 0
            fi
            echo "Attempt $i: status=$status"
          done
          echo "Deploy verification failed — /health never returned 200"
          exit 1
