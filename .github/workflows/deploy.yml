name: Train → Build → Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/agri-yield

jobs:
  train-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies (locked)
        run: uv sync --frozen --dev

      - name: Lint with ruff
        run: uv run ruff check . --output-format=github

      - name: Generate training data and train model
        run: uv run python training/train_and_export.py

      - name: Verify model artefacts exist
        run: |
          set -e
          ls -lh model.pkl
          ls -lh model_bundle.pkl
          echo "model.pkl and model_bundle.pkl ready"

      - name: Assert quality gate (RMSE from bundle < 2000 kg/ha)
        run: |
          uv run python - <<'EOF'
          import pickle

          with open("model_bundle.pkl", "rb") as f:
              bundle = pickle.load(f)

          rmse = bundle.get("rmse", 9999)
          has_quantile = "lower" in bundle and "upper" in bundle
          dataset_source = bundle.get("dataset_source", "unknown")
          trained_at = bundle.get("trained_at", "unknown")

          print(f"Bundle RMSE:        {rmse:.2f} kg/ha")
          print(f"Has quantile CI:    {has_quantile}")
          print(f"Dataset source:     {dataset_source}")
          print(f"Trained at:         {trained_at}")
          print(f"Ordering violations:{bundle.get('ordering_violations', 'n/a')}")

          assert rmse < 2000, f"RMSE {rmse:.2f} exceeds threshold of 2000 kg/ha — failing CI"
          assert has_quantile, "model_bundle.pkl missing quantile models — check train_and_export.py"
          print("Quality gate passed.")
          EOF

      - name: Run tests
        run: uv run python -m pytest tests/ -v --tb=short

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          build-args: |
            BUILD_VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -fsSL "$RENDER_DEPLOY_HOOK"

      - name: Wait for deploy and verify /health + /model/info
        if: env.RENDER_SERVICE_URL != ''
        env:
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          set -e
          echo "Waiting for Render deploy (cold start ~50s)..."
          for i in $(seq 1 30); do
            sleep 10
            status=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_SERVICE_URL/health" 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "Deploy verified — /health returned 200"
              curl -s "$RENDER_SERVICE_URL/health" | python3 -m json.tool
              echo "--- Model info ---"
              curl -s "$RENDER_SERVICE_URL/model/info" | python3 -m json.tool
              exit 0
            fi
            echo "Attempt $i: status=$status"
          done
          echo "Deploy verification failed — /health never returned 200"
          exit 1
