name: Train → Build → Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install training dependencies directly
        run: |
          pip install --upgrade pip
          pip install \
            numpy pandas scikit-learn xgboost pyarrow \
            fastapi uvicorn pydantic requests tenacity \
            prometheus-client prometheus-fastapi-instrumentator \
            mlflow

      - name: Generate synthetic training data
        run: python generate_data.py

      - name: Train model and save model.pkl
        run: python training/train_and_export.py

      - name: Verify model.pkl exists
        run: |
          ls -lh model.pkl
          echo "Model trained successfully"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/agri-yield:latest
            ghcr.io/${{ github.repository_owner }}/agri-yield:${{ github.sha }}

      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -s "$RENDER_DEPLOY_HOOK"
