name: Train → Build → Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/agri-yield

jobs:
  train-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install training dependencies
        run: |
          set -e
          pip install --upgrade pip
          pip install \
            numpy pandas scikit-learn xgboost pyarrow \
            fastapi uvicorn pydantic requests tenacity \
            prometheus-client prometheus-fastapi-instrumentator \
            mlflow

      - name: Generate synthetic training data
        run: |
          set -e
          python generate_data.py

      - name: Train model and save model.pkl
        run: |
          set -e
          python training/train_and_export.py

      - name: Verify model.pkl exists
        run: |
          set -e
          ls -lh model.pkl
          echo "model.pkl ready"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Force-retag latest in registry
        run: |
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag  ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest
          echo "Retagged ${{ github.sha }} as latest"

      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -fsSL "$RENDER_DEPLOY_HOOK"
