name: Train → Build → Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/agri-yield

jobs:
  train-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install training and lint dependencies
        run: |
          set -e
          pip install --upgrade pip
          pip install \
            numpy pandas scikit-learn xgboost pyarrow \
            fastapi uvicorn pydantic requests tenacity \
            prometheus-client prometheus-fastapi-instrumentator \
            mlflow ruff

      - name: Lint with ruff
        run: |
          set -e
          ruff check . --output-format=github

      - name: Generate synthetic training data
        run: |
          set -e
          python generate_data.py

      - name: Train model and save model.pkl
        run: |
          set -e
          python training/train_and_export.py

      - name: Install test dependencies
        run: |
          set -e
          pip install pytest pytest-md httpx

      - name: Run tests
        run: |
          set -e
          python -m pytest tests/ -v --tb=short

      - name: Verify model.pkl exists
        run: |
          set -e
          ls -lh model.pkl
          echo "model.pkl ready"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          build-args: |
            BUILD_VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -fsSL "$RENDER_DEPLOY_HOOK"

      - name: Wait for deploy and verify /health
        if: env.RENDER_SERVICE_URL != ''
        env:
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          set -e
          echo "Waiting for Render deploy (cold start ~50s)..."
          for i in $(seq 1 30); do
            sleep 10
            status=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_SERVICE_URL/health" 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "Deploy verified — /health returned 200"
              curl -s "$RENDER_SERVICE_URL/health"
              exit 0
            fi
            echo "Attempt $i: status=$status"
          done
          echo "Deploy verification failed — /health never returned 200"
          exit 1
